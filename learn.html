<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      /* 체크박스 숨기기 */
      #notice-close {
        display: none;
      }

      /* 알림 박스 */
      .notice-box {
        position: fixed;
        top: 20px;
        left: 20px;

        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);

        padding: 14px 18px;
        border-radius: 18px;

        font-size: 14px;
        font-weight: 500;
        color: #111;

        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);

        display: flex;
        align-items: center;
        gap: 12px;

        z-index: 999;

        transition:
          opacity 0.4s ease,
          transform 0.4s ease,
          visibility 0.4s;
      }

      /* X 버튼 */
      .close-btn {
        cursor: pointer;
        font-size: 16px;
        opacity: 0.6;
        transition: opacity 0.2s ease;
      }

      .close-btn:hover {
        opacity: 1;
      }

      /* 체크되면 사라짐 */
      #notice-close:checked + .notice-box {
        opacity: 0;
        transform: translateY(-10px);
        visibility: hidden;
      }

      /* 클릭 가능한 느낌 */
      .notice-text {
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <input type="checkbox" id="notice-close" />

    <div class="notice-box">
      <div class="notice-text">직접 블록을 쌓아보세요</div>

      <label for="notice-close" class="close-btn"> ✕ </label>
    </div>
  </body>
</html>
