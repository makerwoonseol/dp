<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>3x3 Mini Puzzle</title>

    <style>
      /* 전체 화면 가운데 정렬 */
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f5f5;
      }

      /* 퍼즐 전체 묶음 */
      .puzzle {
        position: relative;
        width: 330px;
        height: 330px;
      }

      /* radio 버튼 숨기기 */
      input {
        display: none;
      }

      /* 3x3 그리드 */
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 10px;
      }

      #c1:checked ~ .grid label[for="c1"],
      #c2:checked ~ .grid label[for="c2"],
      #c3:checked ~ .grid label[for="c3"],
      #c4:checked ~ .grid label[for="c4"],
      #c5:checked ~ .grid label[for="c5"],
      #c6:checked ~ .grid label[for="c6"],
      #c7:checked ~ .grid label[for="c7"],
      #c8:checked ~ .grid label[for="c8"],
      #c9:checked ~ .grid label[for="c9"] {
        animation-play-state: paused; /* 클릭한 시점의 색상에서 멈춤! */
      }

      #c1:checked ~ .grid label[for="c1"]::after,
      #c2:checked ~ .grid label[for="c2"]::after,
      #c3:checked ~ .grid label[for="c3"]::after,
      #c4:checked ~ .grid label[for="c4"]::after,
      #c5:checked ~ .grid label[for="c5"]::after,
      #c6:checked ~ .grid label[for="c6"]::after,
      #c7:checked ~ .grid label[for="c7"]::after,
      #c8:checked ~ .grid label[for="c8"]::after,
      #c9:checked ~ .grid label[for="c9"]::after {
        opacity: 0;
      }

      @keyframes randomColor {
        0% {
          background-color: #ff6b6b;
        } /* 빨강 */
        25% {
          background-color: #4ecdc4;
        } /* 민트 */
        50% {
          background-color: #ffe66d;
        } /* 노랑 */
        75% {
          background-color: #1a535c;
        } /* 청록 */
        100% {
          background-color: #ff6b6b;
        } /* 다시 빨강 */
      }

      /* 2. 모든 셀에 애니메이션 적용 (평소에는 무한 반복) */
      .cell {
        position: relative;
        border: 2px solid #ccc;
        cursor: pointer;
        overflow: hidden;
        transition:
          background-color 0.3s ease,
          transform 0.3s ease;
        animation: randomColor 0.2s infinite linear; /* 0.2초마다 한 바퀴씩 아주 빠르게 */
      }

      /* 3. 체크 전에는 흰색 막이 애니메이션을 가려둠 */
      .cell::after {
        content: "";
        position: absolute;
        inset: 0;
        background: white;
        opacity: 1;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="puzzle">
      <!-- 상태 저장용 radio -->
      <input type="checkbox" name="pos" id="c1" />
      <input type="checkbox" name="pos" id="c2" />
      <input type="checkbox" name="pos" id="c3" />
      <input type="checkbox" name="pos" id="c4" />
      <input type="checkbox" name="pos" id="c5" />
      <input type="checkbox" name="pos" id="c6" />
      <input type="checkbox" name="pos" id="c7" />
      <input type="checkbox" name="pos" id="c8" />
      <input type="checkbox" name="pos" id="c9" />

      <!-- 클릭 가능한 3x3 칸 -->
      <div class="grid">
        <label for="c1" class="cell"></label>
        <label for="c2" class="cell"></label>
        <label for="c3" class="cell"></label>
        <label for="c4" class="cell"></label>
        <label for="c5" class="cell"></label>
        <label for="c6" class="cell"></label>
        <label for="c7" class="cell"></label>
        <label for="c8" class="cell"></label>
        <label for="c9" class="cell"></label>
      </div>
    </div>
  </body>
</html>
